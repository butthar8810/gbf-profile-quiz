<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>グランブルーファンタジー プロフィールクイズ</title>
</head>
<body>
    <header>
        <div id="main-header">
            <div id="header-logo">
                <a href="/"><img src="images/ip-granblue.png" alt=""></a>
            </div>
            <div id="header-link-list">
                    
            </div>
        </div>
    </header>
    <div id="dummy-header"></div>

    <h1 id="title">グランブルーファンタジー プロフィールクイズ</h1>
    <div id="quiz-form">
        <div id="cards-form">
            <div class="card">ヒント1</div>
            <div class="card">ヒント2</div>
            <div class="card">ヒント3</div>
            <div class="card">ヒント4</div>
            <div class="card">ヒント5</div>
            <div class="card">ヒント6</div>
            <div class="card">ヒント7</div>
            <div class="card">ヒント8</div>
            <div class="card">ヒント9</div>
            <div class="card">ヒント10</div>
        </div>
        <div id="input-form">
            <input id="answer-input" type="text" placeholder="答えを入力…">
            <button id="submit-btn">回答</button>
        </div>
        <div id="result-form">
            <div id="result"></div>
            <img id="result-image" src alt="正解画像">
        </div>
        <div id="score-form">
            <div id="score-board"></div>
            <img id="score-image" src="images/Luria.png" alt="">
            <button id="screenshot-btn">スクリーンショットを撮る</button>
        </div>
    </div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="js/quiz.js"></script>

</body>
</html>
